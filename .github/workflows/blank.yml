name: Full Stack CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Build Step
        run: echo "Build Successful"

      - name: Deploy Step
        run: echo "Deploy Successful"
